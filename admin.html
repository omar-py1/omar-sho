<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
</head>
<body>

<script>
if (prompt("Password") !== "1234") {
  document.body.innerHTML = "<h1>Access Denied</h1>";
  throw new Error("blocked");
}
</script>

<h1>📊 Admin Dashboard</h1>

<h2 id="total">Loading...</h2>
<h3 id="today"></h3>

<div id="list"></div>

<style>
body { font-family: Arial; background:#0f0f0f; color:white; padding:20px; }
.card { background:#1e1e1e; padding:10px; margin:10px 0; border-radius:10px; }
h1 { color:#00ffcc; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEJV1E1MMfjbFtneZpd4DAv7TgKscfhc",
  authDomain: "omar-py.firebaseapp.com",
  projectId: "omar-py",
  storageBucket: "omar-py.firebasestorage.app",
  messagingSenderId: "811902556497",
  appId: "1:811902556497:web:dbaada7d83e90c8aed1b70"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const snapshot = await getDocs(collection(db, "visits"));

document.getElementById("total").innerText =
"👥 Total Visits: " + snapshot.size;

let today = new Date().toISOString().split("T")[0];
let todayCount = 0;

let html = "";

snapshot.forEach(doc => {
  const d = doc.data();

  if (d.time.includes(today)) todayCount++;

  html += `
    <div class="card">
      📄 Page: ${d.page}<br>
      ⏰ Time: ${d.time}<br>
      📱 Device: ${d.userAgent}<br>
      🖥 Screen: ${d.screen}
    </div>
  `;
});

document.getElementById("today").innerText =
"📅 Today Visits: " + todayCount;

document.getElementById("list").innerHTML = html;
</script>

</body>
</html>
