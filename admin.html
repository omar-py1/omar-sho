<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
</head>
<body>

<h1>📊 لوحة التحكم</h1>

<div id="stats"></div>
<div id="list"></div>

<style>
body { font-family: Arial; background:#111; color:white; padding:20px; }
.card { background:#222; padding:10px; margin:10px 0; border-radius:10px; }
</style>

<script>
let visits = JSON.parse(localStorage.getItem("visits") || "[]");

document.getElementById("stats").innerHTML = `
👥 Total Visits: ${visits.length}<br>
📅 Today Visits: ${visits.length}
`;

let html = "";

visits.reverse().forEach(v => {
  html += `
    <div class="card">
      📄 ${v.page}<br>
      ⏰ ${v.time}<br>
      📱 ${v.device}<br>
      🖥 Screen: ${v.screen}
    </div>
  `;
});

document.getElementById("list").innerHTML = html;
</script>

</body>
</html>
