<title>omar-sho | Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.hero {
  text-align: center;  padding: 80px 20px;
  background: linear-gradient(135deg, #141e30, #243b55);
}

.hero h1 {
  font-size: 45px;
}

.btn {
  margin-top: 15px;
  padding: 10px 25px;
  border: none;
  border-radius: 25px;
  background: #38bdf8;
  cursor: pointer;
}

section {
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px auto;
  max-width: 500px;
  border-radius: 10px;
}
.profile {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  margin: 15px auto;
  border: 3px solid #38bdf8;
opacity: 0;
  transform: scale(0.5);
  animation: popIn 1s ease forwards;
}

@keyframes popIn {
  to {
    opacity: 1;
    transform: scale(1);
  }
}
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#popup img {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  border: 3px solid #38bdf8;
  object-fit: cover;
}
</style>

</head>

<body>
<header class="hero">

 <img src="profile.jpg" class="profile" onclick="openImage(this)">
  <h1>🔥 omar-sho</h1>
  <p>مطور ويب | برمجة | مشاريع تقنية</p>
  <a href="https://wa.me/249963571200">
    <button class="btn">تواصل معي</button>
  </a>
</header>

<section>
  <h2>👤 عني</h2>
  <div class="card">
    أنا عمر أيوب، مطور ويب أتعلم بناء المواقع والتطبيقات وأعمل على مشاريع شخصية.
  </div>
</section>

<section>
  <h2>💼 مشاريعي</h2>
  <div class="card">🌐 موقعي الشخصي omar-sho</div>
  <div class="card">⚙️ مشروع ترمكس وتجارب برمجة</div>
</section>

<section>
  <h2>📞 تواصل</h2>
  <div class="card">
    واتساب: 249963571200<br>
    GitHub: omar-py1
  </div>
</section>

<footer style="text-align:center; padding:20px; opacity:0.7;">
© 2026 omar-sho
</footer>
<div id="popup" onclick="closeImage()">
  <img id="popupImg">
</div>

<script>
function openImage(img) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = img.src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}
</script>
</body>
</html>
