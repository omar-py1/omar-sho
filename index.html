<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>omar-sho</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 45px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
      max-width: 500px;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 30px;
      border: none;
      border-radius: 30px;
      background: #00c6ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #0072ff;
      color: white;
    }

    footer {
      position: absolute;
      bottom: 15px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>🔥 مرحباً بك في موقع omar-sho</h1>
    <p>موقع عمر ود ايوب - موقع شخصي احترافي على الإنترنت</p>

    <button class="btn">ابدأ الآن</button>
  </div>

  <footer>
    © 2026 omar-sho | جميع الحقوق محفوظة
  </footer>

</body>
</html>
