<script>
function openImage(img) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = img.src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}
</script>
<div id="movieBox">
  <div id="movieContent">
    <span onclick="closeMovie()" style="float:right; cursor:pointer; font-size:25px;">✖</span>

    <img id="movieImg" style="width:100%; border-radius:10px;">
    <h3 id="movieTitle"></h3>
    <p id="movieDesc"></p>
  </div>
</div>
<script>
function openMovie(img, title, desc) {
  document.getElementById("movieBox").style.display = "flex";
  document.getElementById("movieImg").src = img;
  document.getElementById("movieTitle").innerText = title;
  document.getElementById("movieDesc").innerText = desc;
}

function closeMovie() {
  document.getElementById("movieBox").style.display = "none";
}
</script>
