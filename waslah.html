<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waslah Social Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5}
.header{background:#1877F2;color:white;padding:15px;text-align:center;font-size:20px}
.page{display:none;max-width:600px;margin:auto;padding:10px}
.card{background:white;padding:10px;margin:10px 0;border-radius:10px}
input,button{width:100%;padding:8px;margin-top:5px;box-sizing:border-box}
button{background:#1877F2;color:white;border:none;border-radius:6px;cursor:pointer}
.nav{display:flex;justify-content:space-around;background:white;position:sticky;top:0}
.nav button{background:none;border:none;font-weight:bold}
video{width:100%;border-radius:10px}
</style>
</head>

<body>

<div class="header">وصلة 🔥 Social Pro</div>

<!-- LOGIN -->
<div id="loginPage" class="page" style="display:block">
  <h3>تسجيل دخول</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="nav">
<button onclick="show('home')">Posts</button>
<button onclick="show('chat')">Chat</button>
<button onclick="show('reels')">Reels</button>
<button onclick="logout()">Logout</button>
</div>

<!-- POSTS -->
<div id="home" class="page">
  <input id="postText" placeholder="اكتب منشور">
  <button onclick="addPost()">نشر</button>
  <div id="feed"></div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
  <input id="msgText" placeholder="رسالة">
  <button onclick="sendMsg()">إرسال</button>
  <div id="msgs"></div>
</div>

<!-- REELS -->
<div id="reels" class="page">
  <input id="videoUrl" placeholder="رابط فيديو">
  <button onclick="addReel()">رفع</button>
  <div id="reelsBox"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
apiKey: "PUT_YOUR_KEY",
authDomain: "omar-py.firebaseapp.com",
projectId: "omar-py",
storageBucket: "omar-py.appspot.com",
messagingSenderId: "811902556497",
appId: "PUT_YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* UI */
const loginPage = document.getElementById("loginPage");
const appDiv = document.getElementById("app");
const feed = document.getElementById("feed");
const msgs = document.getElementById("msgs");
const reelsBox = document.getElementById("reelsBox");

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
  if(user){
    loginPage.style.display="none";
    appDiv.style.display="block";
    loadPosts();
    loadMsgs();
    loadReels();
  }else{
    loginPage.style.display="block";
    appDiv.style.display="none";
  }
});

/* AUTH */
window.signup = async ()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = ()=>signOut(auth);

/* NAV */
window.show = (page)=>{
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
};

/* POSTS REALTIME */
function loadPosts(){
  onSnapshot(query(collection(db,"posts")), (snap)=>{
    let html="";
    snap.forEach(d=>{
      html+=`
        <div class="card">
          ${d.data().text}
          <br>
          <small>${d.data().user}</small>
        </div>
      `;
    });
    feed.innerHTML=html;
  });
}

window.addPost = async ()=>{
  if(!auth.currentUser) return;

  await addDoc(collection(db,"posts"),{
    text: postText.value,
    user: auth.currentUser.email
  });

  postText.value="";
};

/* CHAT REALTIME */
function loadMsgs(){
  onSnapshot(collection(db,"messages"), (snap)=>{
    let html="";
    snap.forEach(d=>{
      html+=`<div class="card">${d.data().user}: ${d.data().text}</div>`;
    });
    msgs.innerHTML=html;
  });
}

window.sendMsg = async ()=>{
  if(!auth.currentUser) return;

  await addDoc(collection(db,"messages"),{
    text: msgText.value,
    user: auth.currentUser.email
  });

  msgText.value="";
};

/* REELS REALTIME */
function loadReels(){
  onSnapshot(collection(db,"reels"), (snap)=>{
    let html="";
    snap.forEach(d=>{
      html+=`
        <div class="card">
          <video src="${d.data().url}" controls></video>
        </div>
      `;
    });
    reelsBox.innerHTML=html;
  });
}

window.addReel = async ()=>{
  if(!auth.currentUser) return;

  await addDoc(collection(db,"reels"),{
    url: videoUrl.value,
    user: auth.currentUser.email
  });

  videoUrl.value="";
};

</script>

</body>
</html>
