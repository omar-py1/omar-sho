<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وصلة - Social</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f0f2f5;
}

.header {
  background:#1877F2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.nav {
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  position:sticky;
  top:0;
}

.nav button {
  border:none;
  background:none;
  font-weight:bold;
  cursor:pointer;
}

.container {
  max-width:600px;
  margin:auto;
  padding:10px;
}

.post {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input, button {
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:6px;
  box-sizing:border-box;
}

button {
  background:#1877F2;
  color:white;
  border:none;
  cursor:pointer;
}

.comment {
  font-size:13px;
  padding:5px;
  border-top:1px solid #eee;
  margin-top:5px;
}

.smallBtn {
  width:auto;
  padding:5px 10px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">وصلة 🔥 Social</div>

<div class="nav">
<button onclick="showTab('home')">Home</button>
<button onclick="showTab('posts')">Posts</button>
<button onclick="showTab('messages')">Messages</button>
<button onclick="showTab('reels')">Reels</button>
<button onclick="showTab('videos')">Videos</button>
</div>

<div class="container">

<!-- إنشاء بوست -->
<div id="createBox" class="post">
<h3>إنشاء بوست</h3>
<input id="postText" placeholder="اكتب منشور...">
<button onclick="addPost()">نشر</button>
</div>

<!-- عرض البوستات -->
<div id="posts"></div>

</div>

<script type="module">
import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const auth = getAuth(app);
const provider = new GoogleAuthProvider();

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  getDoc,
  arrayUnion
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEJV1E1MMfjbFtneZpd4DAaV7TgKscfhc",
  authDomain: "omar-py.firebaseapp.com",
  projectId: "omar-py",
  storageBucket: "omar-py.firebasestorage.app",
  messagingSenderId: "811902556497",
  appId: "1:811902556497:web:dbaada7d83e90c8aed1b70"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👇 هنا تحط كود تسجيل الدخول
onAuthStateChanged(auth, (user) => {
  if (!user) {
    document.body.innerHTML = `
      <div style="text-align:center;margin-top:100px;">
        <h2>لازم تسجل دخول</h2>
        <button onclick="login()">تسجيل دخول Google</button>
      </div>
    `;
  } else {
    loadPosts();
  }
});
const userId = getUserId();

// 🆔 user id ثابت
function getUserId(){
  let id = localStorage.getItem("uid");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("uid", id);
  }
  return id;
}

// =======================
// 🟢 إنشاء بوست
// =======================
window.addPost = async function () {
  let text = document.getElementById("postText").value;
  if (!text) return;

  await addDoc(collection(db, "posts"), {
    text,
    likes: 0,
    likedBy: [],
    comments: []
  });

  document.getElementById("postText").value = "";
  loadPosts();
};

// =======================
// ❤️ لايك (toggle احترافي)
// =======================
window.likePost = async function (id) {

  const ref = doc(db, "posts", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) return;

  const post = snap.data();
  const likedBy = post.likedBy || [];

  const liked = likedBy.includes(userId);

  if (liked) {
    await updateDoc(ref, {
      likes: Math.max((post.likes || 1) - 1, 0),
      likedBy: likedBy.filter(u => u !== userId)
    });
  } else {
    await updateDoc(ref, {
      likes: (post.likes || 0) + 1,
      likedBy: arrayUnion(userId)
    });
  }

  loadPosts();
};

// =======================
// 💬 تعليق
// =======================
window.addComment = async function (id) {

  let input = document.getElementById("c-" + id);
  let text = input.value;

  if (!text) return;

  await updateDoc(doc(db, "posts", id), {
    comments: arrayUnion(text)
  });

  input.value = "";
  loadPosts();
};

// =======================
// 📦 عرض البوستات
// =======================
async function loadPosts() {

  let snap = await getDocs(collection(db, "posts"));

  let html = "";

  snap.forEach(d => {

    let p = d.data();

    html += `
      <div class="post">
        <p>${p.text}</p>

        <button onclick="likePost('${d.id}')">
          ❤️ ${p.likes || 0}
        </button>

        <input id="c-${d.id}" placeholder="اكتب تعليق...">
        <button class="smallBtn" onclick="addComment('${d.id}')">إرسال</button>
    `;

    (p.comments || []).forEach(c => {
      html += `<div class="comment">💬 ${c}</div>`;
    });

    html += `</div>`;
  });

  document.getElementById("posts").innerHTML = html;
}

// =======================
// 📱 تبويبات (واجهة فقط)
// =======================
window.showTab = function(tab){

  if(tab === "home"){
    document.getElementById("createBox").style.display = "block";
    loadPosts();
  }

  if(tab !== "home"){
    document.getElementById("createBox").style.display = "none";
    document.getElementById("posts").innerHTML =
      `<div class="post">📌 هذه الصفحة تحت التطوير: ${tab}</div>`;
  }
};

loadPosts();
window.login = async function () {
  await signInWithPopup(auth, provider);
};
</script>

</body>
</html>
