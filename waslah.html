<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waslah Facebook Lite</title>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5}
.header{background:#1877F2;color:white;padding:12px;text-align:center}
.nav{display:flex;justify-content:space-around;background:white;position:sticky;top:0}
.nav button{background:none;border:none;font-weight:bold;padding:10px}
.page{display:none;max-width:600px;margin:auto;padding:10px}
.card{background:white;padding:10px;margin:10px 0;border-radius:10px}
input,button{width:100%;padding:8px;margin-top:5px}
button{background:#1877F2;color:white;border:none;border-radius:6px;cursor:pointer}
.small{font-size:12px;color:gray}
</style>
</head>

<body>

<div class="header">Waslah Social 🔵</div>

<!-- LOGIN -->
<div id="login" class="page" style="display:block">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="nav">
<button onclick="show('home')">Posts</button>
<button onclick="show('chat')">Chat</button>
<button onclick="show('reels')">Reels</button>
<button onclick="show('profile')">Profile</button>
<button onclick="logout()">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="page">
  <input id="postText" placeholder="What's on your mind?">
  <button onclick="addPost()">Post</button>
  <div id="feed"></div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
  <input id="msgText" placeholder="Message">
  <button onclick="sendMsg()">Send</button>
  <div id="msgs"></div>
</div>

<!-- REELS -->
<div id="reels" class="page">
  <input id="videoUrl" placeholder="Video URL">
  <button onclick="addReel()">Upload</button>
  <div id="reelsBox"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <div class="card">
    <h3>My Profile</h3>
    <div id="myInfo"></div>
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth, createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection, addDoc,
onSnapshot, doc, updateDoc, arrayUnion, arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 Firebase */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "omar-py.firebaseapp.com",
projectId: "omar-py",
storageBucket: "omar-py.appspot.com",
messagingSenderId: "811902556497",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");

let currentUser = null;

/* AUTH */
onAuthStateChanged(auth,(u)=>{
  if(u){
    currentUser = u;
    loginDiv.style.display="none";
    appDiv.style.display="block";
    loadAll();
  }else{
    loginDiv.style.display="block";
    appDiv.style.display="none";
  }
});

/* LOGIN */
window.signup = ()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login = ()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout = ()=>signOut(auth);

/* NAV */
window.show = (p)=>{
  document.querySelectorAll(".page").forEach(e=>e.style.display="none");
  document.getElementById(p).style.display="block";
};

/* POSTS */
window.addPost = async ()=>{
  await addDoc(collection(db,"posts"),{
    text:postText.value,
    user:currentUser.email,
    likes:0,
    comments:[]
  });
  postText.value="";
};

function loadPosts(){
  onSnapshot(collection(db,"posts"),snap=>{
    feed.innerHTML="";
    snap.forEach(d=>{
      feed.innerHTML += `
        <div class="card">
          ${d.data().text}
          <div class="small">${d.data().user}</div>
        </div>
      `;
    });
  });
}

/* CHAT */
window.sendMsg = async ()=>{
  await addDoc(collection(db,"messages"),{
    text:msgText.value,
    user:currentUser.email
  });
  msgText.value="";
};

function loadMsgs(){
  onSnapshot(collection(db,"messages"),snap=>{
    msgs.innerHTML="";
    snap.forEach(d=>{
      msgs.innerHTML += `<div class="card">${d.data().user}: ${d.data().text}</div>`;
    });
  });
}

/* REELS */
window.addReel = async ()=>{
  await addDoc(collection(db,"reels"),{
    url:videoUrl.value,
    user:currentUser.email
  });
  videoUrl.value="";
};

function loadReels(){
  onSnapshot(collection(db,"reels"),snap=>{
    reelsBox.innerHTML="";
    snap.forEach(d=>{
      reelsBox.innerHTML += `
        <div class="card">
          <video src="${d.data().url}" controls></video>
        </div>
      `;
    });
  });
}

/* LOAD ALL */
function loadAll(){
  loadPosts();
  loadMsgs();
  loadReels();
}

</script>

</body>
</html>
