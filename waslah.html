<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وصلة</title>
<style>
body { font-family: Arial; background: #f0f2f5; margin: 0; }
.header { background: #1877F2; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; }
.post { background: white; margin: 10px; padding: 15px; border-radius: 10px; }
.post h3 { color: #1877F2; }
</style>
</head>
<body>
<div class="header">وصلة 🔗</div>
<div class="post">
<h3>عمر أيوب</h3>
<p>أهلاً بكم في وصلة! 🎉</p>
<button class="like-btn" onclick="like(this)">❤️ إعجاب <span>0</span></button>
</div>
<script>
function like(btn) {
  btn.classList.toggle('liked');
  let n = parseInt(btn.querySelector('span').innerText);
  btn.querySelector('span').innerText = btn.classList.contains('liked') ? n+1 : n-1;
}
</script>
</body>
</html>
