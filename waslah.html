<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waslah Social</title>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5}
.header{background:#1877F2;color:white;padding:15px;text-align:center;font-size:20px}
.page{display:none;max-width:600px;margin:auto;padding:10px}
.card{background:white;padding:10px;margin:10px 0;border-radius:10px}
input,button{width:100%;padding:8px;margin-top:5px;box-sizing:border-box}
button{background:#1877F2;color:white;border:none;border-radius:6px}
.nav{display:flex;justify-content:space-around;background:white;position:sticky;top:0}
.nav button{background:none;border:none;font-weight:bold}
video{width:100%;border-radius:10px}
</style>
</head>

<body>

<div class="header">وصلة 🔥 Social</div>

<!-- LOGIN -->
<div id="loginPage" class="page" style="display:block">
  <h3>تسجيل دخول</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('chat')">Chat</button>
<button onclick="show('reels')">Reels</button>
<button onclick="logout()">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="page">
  <input id="postText" placeholder="اكتب منشور">
  <button onclick="addPost()">نشر</button>
  <div id="feed"></div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
  <input id="msgText" placeholder="رسالة">
  <button onclick="sendMsg()">إرسال</button>
  <div id="msgs"></div>
</div>

<!-- REELS -->
<div id="reels" class="page">
  <input id="videoUrl" placeholder="رابط فيديو">
  <button onclick="addReel()">رفع</button>
  <div id="reelsBox"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "omar-py.firebaseapp.com",
projectId: "omar-py",
storageBucket: "omar-py.appspot.com",
messagingSenderId: "811902556497",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

/* ================= AUTH ================= */
onAuthStateChanged(auth,(u)=>{
  if(u){
    user = u;
    loginPage.style.display="none";
    appDiv.style.display="block";
    show("home");
    loadPosts();
    loadMsgs();
    loadReels();
  }else{
    loginPage.style.display="block";
    appDiv.style.display="none";
  }
});

window.signup = async ()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = ()=>signOut(auth);

/* ================= NAV ================= */
window.show = (p)=>{
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
};

/* ================= POSTS ================= */
window.addPost = async ()=>{
  if(!postText.value) return;

  await addDoc(collection(db,"posts"),{
    text:postText.value,
    user:user.email
  });

  postText.value="";
  loadPosts();
};

async function loadPosts(){
  let snap = await getDocs(collection(db,"posts"));
  let html="";

  snap.forEach(d=>{
    html+=`
      <div class="card">
        ${d.data().text}
        <br>
        <small>${d.data().user}</small>
      </div>
    `;
  });

  feed.innerHTML=html;
}

/* ================= CHAT ================= */
window.sendMsg = async ()=>{
  if(!msgText.value) return;

  await addDoc(collection(db,"messages"),{
    text:msgText.value,
    user:user.email
  });

  msgText.value="";
  loadMsgs();
};

async function loadMsgs(){
  let snap = await getDocs(collection(db,"messages"));
  let html="";

  snap.forEach(d=>{
    html+=`<div class="card">${d.data().user}: ${d.data().text}</div>`;
  });

  msgs.innerHTML=html;
}

/* ================= REELS ================= */
window.addReel = async ()=>{
  if(!videoUrl.value) return;

  await addDoc(collection(db,"reels"),{
    url:videoUrl.value,
    user:user.email
  });

  videoUrl.value="";
  loadReels();
};

async function loadReels(){
  let snap = await getDocs(collection(db,"reels"));
  let html="";

  snap.forEach(d=>{
    html+=`
      <div class="card">
        <video src="${d.data().url}" controls></video>
      </div>
    `;
  });

  reelsBox.innerHTML=html;
}

</script>

</body>
</html>
