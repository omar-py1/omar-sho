<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waslah Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5}
.header{background:#1877F2;color:white;padding:12px;text-align:center}
.page{display:none;max-width:600px;margin:auto;padding:10px}
.card{background:white;padding:10px;margin:10px 0;border-radius:10px}
input,button{width:100%;padding:8px;margin-top:5px;box-sizing:border-box}
button{background:#1877F2;color:white;border:none;border-radius:6px;cursor:pointer}
.nav{display:flex;justify-content:space-around;background:white;position:sticky;top:0}
.nav button{background:none;border:none;font-weight:bold;padding:10px}
</style>
</head>

<body>

<div class="header">Waslah Pro 🔵</div>

<!-- LOGIN -->
<div id="login" class="page" style="display:block">
  <h3>تسجيل الدخول</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="nav">
<button onclick="show('home')">Posts</button>
<button onclick="show('chat')">Chat</button>
<button onclick="logout()">Logout</button>
</div>

<!-- POSTS -->
<div id="home" class="page">
  <input id="postText" placeholder="اكتب منشور">
  <button onclick="addPost()">Post</button>
  <div id="feed"></div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
  <input id="msgText" placeholder="رسالة">
  <button onclick="sendMsg()">Send</button>
  <div id="msgs"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDEJV1E1MMfjbFtneZpd4DAV7TgKscfhc",
  authDomain: "omar-py.firebaseapp.com",
  projectId: "omar-py",
  storageBucket: "omar-py.firebasestorage.app",
  messagingSenderId: "811902556497",
  appId: "1:811902556497:web:dbaada7d83e90c8aed1b70"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= UI ================= */
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");
const feed = document.getElementById("feed");
const msgs = document.getElementById("msgs");

const email = document.getElementById("email");
const password = document.getElementById("password");
const postText = document.getElementById("postText");
const msgText = document.getElementById("msgText");

/* ================= AUTH ================= */
onAuthStateChanged(auth,(user)=>{
  if(user){
    loginDiv.style.display="none";
    appDiv.style.display="block";
    loadPosts();
    loadMsgs();
  }else{
    loginDiv.style.display="block";
    appDiv.style.display="none";
  }
});

/* ================= AUTH ACTIONS ================= */
window.signup = async ()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = ()=>signOut(auth);

/* ================= NAV ================= */
window.show = (page)=>{
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
};

/* ================= POSTS ================= */
window.addPost = async ()=>{
  if(!postText.value) return;

  await addDoc(collection(db,"posts"),{
    text: postText.value,
    user: auth.currentUser.email
  });

  postText.value="";
};

function loadPosts(){
  onSnapshot(collection(db,"posts"),(snap)=>{
    feed.innerHTML="";
    snap.forEach(d=>{
      feed.innerHTML += `
        <div class="card">
          ${d.data().text}
          <br>
          <small>${d.data().user}</small>
        </div>
      `;
    });
  });
}

/* ================= CHAT ================= */
window.sendMsg = async ()=>{
  if(!msgText.value) return;

  await addDoc(collection(db,"messages"),{
    text: msgText.value,
    user: auth.currentUser.email
  });

  msgText.value="";
};

function loadMsgs(){
  onSnapshot(collection(db,"messages"),(snap)=>{
    msgs.innerHTML="";
    snap.forEach(d=>{
      msgs.innerHTML += `
        <div class="card">
          ${d.data().user}: ${d.data().text}
        </div>
      `;
    });
  });
}

</script>

</body>
</html>
